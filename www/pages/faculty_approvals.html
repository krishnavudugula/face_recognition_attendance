<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Faculty Approvals - FaceAttend Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="../js/back-button-native.js"></script>
    <script src="../js/route-persistence.js"></script>
    <script src="../js/location-tracking-plugin.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/session-persistence.js" defer></script>
    <script src="../js/main.js" defer></script>
    <script src="../js/faculty_approvals.js" defer></script>
    <style>
        .approval-container {
            padding: 1rem;
            width: 100%;
            box-sizing: border-box;
            max-width: 100vw;
            margin: 0 auto;
            overflow-x: hidden;
        }
        
        @media (min-width: 768px) {
            .approval-container {
                padding: 2rem;
                max-width: 1200px;
            }
        }
    </style>
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <a href="admin_dashboard.html" class="navbar-brand">
            <div class="logo-icon">
                <img src="../assets/Bits-logo.png" alt="BITS Logo">
            </div>
            <span>Faculty Approvals</span>
        </a>
        <div class="mobile-nav-actions" style="display: flex; align-items: center; gap: 1rem;">
            <button class="menu-toggle" aria-label="Toggle navigation"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="nav-menu">
            <ul class="navbar-nav">
                <li><a href="admin_dashboard.html" class="nav-link">Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <div class="approval-container">
        <div id="facultyRegistrationSection" class="glass-card section-card" style="padding: 1.5rem; border: 1px solid #ddd; border-radius: 16px; background: linear-gradient(135deg, #f0fdf4 0%, #f8fafc 100%);">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h3 style="margin: 0; color: #0f172a; font-size: 1.15rem; letter-spacing: -0.01em; display: flex; align-items: center; gap: 0.75rem;">
                        <i class="fa-solid fa-user-check" style="color: #059669; font-size: 1.3rem;"></i>
                        Pending Approvals
                    </h3>
                </div>
                <div id="registrationBadge" style="background: #ef4444; color: white; padding: 0.5rem 1rem; border-radius: 999px; font-weight: 700; font-size: 0.85rem; display: none;">
                    <i class="fa-solid fa-exclamation-circle" style="margin-right: 0.5rem;"></i> <span id="pendingCount">0</span> Pending
                </div>
            </div>

            <div id="registrationTableContainer" style="overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0;">
                <table style="width: 100%; border-collapse: collapse; background: white;">
                    <thead>
                        <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: #475569; font-size: 0.85rem;">User ID</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: #475569; font-size: 0.85rem;">Name</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: #475569; font-size: 0.85rem;">Email</th>
                            <th style="padding: 1rem; text-align: left; font-weight: 700; color: #475569; font-size: 0.85rem;">Submitted</th>
                            <th style="padding: 1rem; text-align: center; font-weight: 700; color: #475569; font-size: 0.85rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="registrationTableBody">
                        <tr>
                            <td colspan="5" style="padding: 2rem; text-align: center; color: #94a3b8;">
                                <i class="fa-solid fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Loading pending registrations...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

            <!-- MODAL FOR APPROVAL/REJECTION FEEDBACK -->
    <div id="registrationActionModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; justify-content: center; align-items: center; padding: 1rem;">
        <div style="background: white; border-radius: 16px; padding: 2rem; max-width: 500px; width: 100%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); position: relative;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                <h3 id="modalTitle" style="margin: 0; font-size: 1.25rem; color: #0f172a;">Confirm Action</h3>
                <button onclick="closeRegistrationModal()" style="background: transparent; border: none; font-size: 1.5rem; color: #94a3b8; cursor: pointer;">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <p id="modalMessage" style="color: #475569; margin-bottom: 1.5rem; line-height: 1.5;"></p>
            
            <div id="rejectionReason" style="display: none; margin-bottom: 1.5rem;">
                <label for="rejectionNotes" style="display: block; font-weight: 600; color: #334155; margin-bottom: 0.5rem;">Reason for Rejection <span style="color: #ef4444;">*</span></label>
                <textarea id="rejectionNotes" rows="3" style="width: 100%; box-sizing: border-box; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; resize: vertical; outline: none; transition: border-color 0.2s;" placeholder="Please provide a reason to the user..."></textarea>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button onclick="closeRegistrationModal()" class="action-btn-secondary" style="padding: 0.75rem 1.5rem; border: 1px solid #cbd5e1; background: white; color: #475569; border-radius: 8px; font-weight: 600; cursor: pointer;">Cancel</button>
                <button id="confirmActionBtn" onclick="submitApprovalAction()" style="padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: 600; color: white; cursor: pointer; background: #3b82f6;">Confirm</button>
            </div>
        </div>
    </div>
</body>
</html>
