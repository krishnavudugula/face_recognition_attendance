<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Enterprise Live Tracking - FaceAttend</title>
    <script src="../js/back-button-native.js"></script> 
    <!-- Modern Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />

    <style>
        :root {
            /* Premium Light Palette */
            --brand-blue: #2563EB;
            --brand-indigo: #4F46E5;
            --brand-light: #EFF6FF;
            --success: #10B981;
            --success-light: #D1FAE5;
            --danger: #EF4444;
            --danger-light: #FEE2E2;
            --warning: #F59E0B;
            --bg-page: #F8FAFC;
            --bg-surface: #FFFFFF;
            --border-subtle: #E2E8F0;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-tertiary: #94A3B8;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.02);
            --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, 0.05), 0 2px 4px -2px rgba(15, 23, 42, 0.02);
            --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.05), 0 4px 6px -4px rgba(15, 23, 42, 0.02);
            --shadow-float: 0 20px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.04);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", sans-serif; }
        
        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-page);
            overflow: hidden;
            color: var(--text-primary);
        }

        /* --- Layout Grid --- */
        .tracking-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- Map Container --- */
        .map-section {
            flex: 1;
            position: relative;
            background: #e2e8f0;
            z-index: 1;
        }
        #enterpriseMap { width: 100%; height: 100%; }

        /* --- Floating Navigation Header --- */
        .glass-nav {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 14px 24px 14px 16px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-float);
            border: 1px solid rgba(255, 255, 255, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-button {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            background: var(--bg-page);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .back-button:hover { background: var(--brand-light); color: var(--brand-blue); border-color: #BFDBFE; transform: translateX(-2px); }

        .nav-info { display: flex; flex-direction: column; justify-content: center; }
        .nav-title { font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 2px;}
        .nav-subtitle { font-size: 0.8rem; font-weight: 600; color: var(--success); display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em;}
        
        .pulse-ring {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
            animation: soft-pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes soft-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* --- Floating Analytics Right Panel --- */
        .analytics-sidebar {
            position: absolute;
            top: 24px;
            right: 24px;
            bottom: 24px;
            width: 380px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-float);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-subtle);
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0) 100%);
        }
        
        .sidebar-header h2 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Metric Cards Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .metric-card {
            background: var(--bg-page);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: #CBD5E1; }
        
        .metric-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
        .metric-value { font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--text-primary); line-height: 1; }
        
        .metric-card.alert { background: #FEF2F2; border-color: #FCA5A5; }
        .metric-card.alert .metric-value { color: var(--danger); }
        .metric-card.alert .metric-label { color: #B91C1C; }

        /* User List Section */
        .user-list-header {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-list-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .user-list::-webkit-scrollbar { width: 6px; }
        .user-list::-webkit-scrollbar-track { background: transparent; }
        .user-list::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }

        /* Individual User Row */
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .user-row:hover {
            border-color: #93C5FD;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
            transform: translateX(4px);
        }
        
        .user-row.faulty { border-color: #FCA5A5; background: #FEF2F2; }

        .u-info { display: flex; align-items: center; gap: 12px; }
        .u-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--brand-light);
            color: var(--brand-blue);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem;
            font-family: "Plus Jakarta Sans", sans-serif;
        }
        .user-row.faulty .u-avatar { background: var(--danger-light); color: var(--danger); }
        
        .u-details { display: flex; flex-direction: column; gap: 4px; }
        .u-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .u-status { font-size: 0.75rem; font-weight: 500; display: flex; align-items: center; gap: 4px; color: var(--text-secondary); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; }
        .status-dot.in { background: var(--success); }
        .status-dot.out { background: var(--danger); }
        
        /* Map Controls */
        .map-controls {
            position: absolute;
            bottom: 32px;
            right: calc(380px + 48px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: right 0.3s ease;
        }

        .fab-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .fab-button:hover { transform: scale(1.1); color: var(--brand-blue); }

        /* Debug Panel */
        .debug-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.95);
            color: #10B981;
            border-radius: var(--radius-md);
            padding: 12px 16px;
            font-size: 0.7rem;
            font-family: 'Courier New', monospace;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #10B981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        .debug-panel-line { margin: 2px 0; white-space: pre-wrap; word-break: break-all; }
        .debug-error { color: #EF4444; }
        .debug-success { color: #10B981; }
        .debug-info { color: #3B82F6; }

        /* Custom Leaflet Map Tweaks */
        .leaflet-popup-content-wrapper { border-radius: var(--radius-lg); padding: 0; box-shadow: var(--shadow-float); border: 1px solid rgba(0,0,0,0.05); }
        .leaflet-popup-content { margin: 0; }
        .leaflet-container a.leaflet-popup-close-button { top: 12px; right: 12px; color: var(--text-tertiary); }
        
        .premium-popup { padding: 16px 20px; text-align: center; }
        .p-name { font-family: "Plus Jakarta Sans", sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
        .p-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-bottom: 8px;}
        .p-badge.safe { background: var(--success-light); color: #065F46; }
        .p-badge.danger { background: var(--danger-light); color: #991B1B; }
        .p-time { font-size: 0.7rem; color: var(--text-tertiary); font-weight: 500; }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .analytics-sidebar { width: 320px; }
            .map-controls { right: calc(320px + 32px); }
        }
        @media (max-width: 768px) {
            .tracking-layout { flex-direction: column; }
            .analytics-sidebar {
                position: fixed;
                bottom: 0; top: auto; right: 0; left: 0;
                width: 100%;
                height: 45vh; 
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                border-bottom: none;
                border-left: none;
                border-right: none;
                box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            }
            .map-section { height: 55vh; }
            .glass-nav { top: 16px; left: 16px; right: 16px; border-radius: var(--radius-lg); padding: 6px; }
            .map-controls { right: 16px; bottom: calc(45vh + 24px); }
            .user-list { padding-bottom: 30px; }
        }
        #cardOutsideFilter.active-filter {
        border-color: var(--danger, #dc2626);
        background-color: rgba(220, 38, 38, 0.05);
    }
    #cardInsideFilter.active-filter {
        border-color: var(--success, #16a34a);
        background-color: rgba(22, 163, 74, 0.05);
    }
</style>
</head>
<body>

<div class="tracking-layout">
    <!-- Map Area -->
    <main class="map-section">
        <div class="glass-nav">
            <a href="reports.html" class="back-button"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="nav-info">
                <div class="nav-title">Fleet Monitoring</div>
                <div class="nav-subtitle"><div class="pulse-ring"></div> Live Streaming</div>
            </div>
        </div>
        <div id="enterpriseMap"></div>
        <div class="map-controls">
            <button class="fab-button" onclick="focusOnCampus()" title="Recenter to Campus">
                <i class="fa-solid fa-crosshairs"></i>
            </button>
        </div>
        
        <!-- Debug Panel -->
        <div class="debug-panel" id="debugPanel"></div>
    </main>

    <!-- Side Panel -->
    <aside class="analytics-sidebar">
        <div class="sidebar-header">
            <h2>Real-Time Overview <span id="lastUpdatedStr" style="font-size: 0.75rem; color: var(--text-tertiary); font-weight: 500;">Just now</span></h2>
            
            <div class="metrics-grid">
                <div class="metric-card" id="cardOutsideFilter" onclick="filterRoster('outside')" style="cursor: pointer; transition: all 0.2s;">
                    <span class="metric-label"><i class="fa-solid fa-triangle-exclamation" style="color: var(--danger, #dc2626);"></i> Out Bounds</span>
                    <span class="metric-value" id="valOutside" style="color: var(--danger, #dc2626);">0</span>
                </div>
                <div class="metric-card" id="cardInsideFilter" onclick="filterRoster('inside')" style="cursor: pointer; transition: all 0.2s;">
                    <span class="metric-label"><i class="fa-solid fa-location-dot" style="color: var(--success);"></i> In Bounds</span>
                    <span class="metric-value" id="valInside" style="color: var(--success);">0</span>
                </div>
            </div>
        </div>

        <div class="user-list-header">
            <span class="user-list-title">Live Roster</span>
            <span style="font-size: 0.75rem; color: var(--brand-blue); background: var(--brand-light); padding: 4px 8px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;" id="rosterCount" onclick="filterRoster('all')" title="Click to show all users">0 Online</span>
        </div>
        
        <div class="user-list" id="activeUserRoster">
            <div style="text-align: center; color: var(--text-tertiary); font-size: 0.85rem; padding: 20px;">
                <i class="fa-solid fa-satellite-dish fa-spin" style="margin-bottom: 8px; font-size: 1.5rem; display: block;"></i>
                Establishing connection...
            </div>
        </div>
    </aside>
</div>

<!-- Core Scripts -->
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<script src="../js/config.js"></script>
<!-- Make sure fetchJsonStrict is loaded -->
<script src="../js/main.js"></script>
<script src="../js/live_tracking.js"></script>

</body>
</html>
